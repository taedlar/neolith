name: "CodeQL"

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.cmake'
      - '**.h'
      - '**.hpp'
      - '**.y'
      - 'CMakeLists.txt'
  push:
    branches: [ "main" ]
    paths:
      - '**.c'
      - '**.cpp'
      - '**.cmake'
      - '**.h'
      - '**.hpp'
      - '**.y'
      - 'CMakeLists.txt'
  schedule:
    - cron: '35 7 * * 5'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: true
      # We only do quick build on github-hosted runners.
      # See https://docs.github.com/en/actions/reference/runners/github-hosted-runners
      matrix:
        include:
        - language: c-cpp
          os: ubuntu-latest
        - language: c-cpp
          os: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        config: |
          paths-ignore:
            - out/

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
      continue-on-error: false

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      env:
        CODEQL_ACTION_FILE_COVERAGE_ON_PRS: true
      with:
        category: "/language:${{matrix.language}}"
